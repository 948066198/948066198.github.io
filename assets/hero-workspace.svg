<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Creative workspace</title>
  <desc id="desc">A calm abstract desk scene with laptop, notebook, light, and color accents.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eaf2ee"/>
      <stop offset="0.42" stop-color="#f7f4ec"/>
      <stop offset="1" stop-color="#cfddd8"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#314246"/>
      <stop offset="0.55" stop-color="#203236"/>
      <stop offset="1" stop-color="#132427"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dbe9e6"/>
      <stop offset="0.52" stop-color="#9fc1bb"/>
      <stop offset="1" stop-color="#245b5d"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="23%" r="42%">
      <stop offset="0" stop-color="#fff5d6" stop-opacity="0.92"/>
      <stop offset="0.52" stop-color="#efc378" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#efc378" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#091719" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1800" height="1100" fill="url(#wall)"/>
  <rect width="1800" height="1100" fill="url(#glow)"/>
  <path d="M0 770 C360 700 560 780 860 730 C1230 668 1510 610 1800 675 L1800 1100 L0 1100 Z" fill="url(#desk)"/>
